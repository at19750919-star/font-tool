<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>字型預覽測試器 · 介面重設計</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&family=Dela+Gothic+One&family=Zen+Old+Mincho:wght@400;700&family=Rampart+One&family=Reggae+One&family=Hachi+Maru+Pop&family=Potta+One&family=RocknRoll+One&family=Kaisei+Opti:wght@400;700&family=Chocolate+Classical+Sans&family=Bebas+Neue&family=Pacifico&family=Abril+Fatface&family=DM+Serif+Display&family=Bodoni+Moda:wght@400;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <template id="__bundler_thumbnail" data-bg-color="#0b1411">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0b1411"/>
      <rect x="360" y="250" width="480" height="300" rx="40" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
      <text x="600" y="470" font-family="serif" font-size="190" font-weight="800" text-anchor="middle" fill="#5fe0a0">永</text>
    </svg>
  </template>
</head>
<body>
  <div class="wrap">

    <!-- ===== Header ===== -->
    <header class="masthead">
      <div>
        <p class="eyebrow">2560 × 1080 Desktop Workspace · 介面重設計</p>
        <h1>字型預覽測試器</h1>
      </div>
      <div class="mast-actions">
        <span class="badge font" id="curFontBadge">Dela Gothic One</span>
        <a class="btn ghost-accent" href="#" id="refLink">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          效果參考圖
        </a>
        <button class="btn" id="compareBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="7" height="16" rx="1"/><rect x="14" y="4" width="7" height="16" rx="1"/></svg>
          對比模式
        </button>
        <button class="btn primary" id="exportBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          匯出 CSS
        </button>
      </div>
    </header>

    <!-- ===== Workspace ===== -->
    <div class="workspace">

      <!-- LEFT: design effects -->
      <aside class="col">
        <section class="panel">
          <div class="panel-h">
            <div>
              <h2>設計效果</h2>
              <p class="desc" id="fxDesc">文字效果：漸層 / 中空 / 多層陰影 / 螢光筆</p>
            </div>
            <button class="clear-link" id="fxClear" hidden>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg>清除
            </button>
          </div>
          <div class="panel-b"><div class="preset-grid" id="designGrid"></div></div>
        </section>

        <section class="panel">
          <div class="panel-h">
            <div>
              <h2>快速效果</h2>
              <p class="desc">可疊加最多 3 個預設</p>
            </div>
            <span class="count-pill" id="quickCount" hidden>0/3</span>
          </div>
          <div class="panel-b"><div class="preset-grid q3" id="quickGrid"></div></div>
        </section>
      </aside>

      <!-- CENTER: preview -->
      <section class="col">
        <div class="panel preview-card">
          <div class="field-wrap">
            <input class="text-input" id="previewInput" value="一杯森活力滿分" spellcheck="false">
          </div>
          <div class="stage" id="stage">
            <div class="preview-text" id="previewEl">一杯森活力滿分</div>
          </div>
        </div>
      </section>

      <!-- RIGHT: unified inspector + code -->
      <aside class="col">
        <section class="panel">
          <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab active" data-mode="text">純文字</button>
            <button class="mode-tab" data-mode="button">按鈕</button>
            <button class="mode-tab" data-mode="card">卡片</button>
            <button class="mode-tab" data-mode="slider">滑桿</button>
          </div>
          <div class="panel-h">
            <div><h2>控制面板</h2><p class="desc" id="inspectorScope">調整目前選取的元件 · 純文字</p></div>
            <span class="tag" id="inspectorTag">Text</span>
          </div>
          <div id="inspectorHost"></div>
        </section>

        <section class="panel">
          <div class="panel-h"><div><h2>CSS 輸出</h2><p class="desc" id="cssScope">.heading 文字樣式</p></div><span class="tag">Export</span></div>
          <div class="panel-b"><div class="code"><button class="code-copy" id="codeCopy">複製</button><div id="codeOut"></div></div></div>
        </section>
      </aside>
    </div>

    <!-- ===== Footer: 字型選擇（全部字型集中在下方） ===== -->
    <section class="panel gallery">
      <div class="panel-h">
        <div><h2>字型選擇</h2><p class="desc">所有字型集中在這裡，點任一卡片即可套用到上方預覽。</p></div>
        <span class="tag">Fonts · Gallery</span>
      </div>
      <div class="panel-b">
        <div class="gal-tools">
          <div class="fsearch" style="margin-bottom:0;max-width:280px;flex:1">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input id="fontSearch" placeholder="搜尋字型名稱">
          </div>
          <input id="gallerySample" value="永 國 字體 Aa 123">
          <span class="color-note">自訂範例字</span>
        </div>
        <div id="galGroups"></div>
      </div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="inspector-schema.js"></script>
  <script src="app.js"></script>
</body>
</html>
