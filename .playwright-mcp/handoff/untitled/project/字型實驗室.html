<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>字型實驗室 · Font Lab</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="scenes.css">
</head>
<body class="mode-inspector">
  <div class="app" id="app">

    <!-- ============ TOP BAR ============ -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">森</div>
        <div>
          <div class="brand-name">字型實驗室</div>
          <div class="brand-sub">Font Lab</div>
        </div>
      </div>

      <label class="sample-field">
        <svg class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V5h16v2M9 5v14M7 19h4"/></svg>
        <input id="sampleInput" type="text" value="一杯森 活力滿分" spellcheck="false" aria-label="預覽文字">
        <div class="sample-presets" id="samplePresets">
          <button class="preset-pill" data-text="永和九杉">永和九杉</button>
          <button class="preset-pill" data-text="0123 ABCabc 永">數字英文</button>
          <button class="preset-pill" data-text="設計，決定第一眼。">長句</button>
        </div>
      </label>

      <div class="topbar-right">
        <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="控制面板擺法">
          <button class="mode-btn active" data-mode="inspector" role="tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
            右側欄
          </button>
          <button class="mode-btn" data-mode="bottom" role="tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
            底部工具列
          </button>
          <button class="mode-btn" data-mode="floating" role="tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><rect x="13" y="12" width="7" height="6" rx="1.5"/></svg>
            浮動精簡
          </button>
        </div>
        <button class="ghost-btn solid" id="exportBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          匯出 CSS
        </button>
      </div>
    </header>

    <!-- ============ WORKSPACE ============ -->
    <div class="workspace">

      <!-- LEFT — font library -->
      <aside class="col">
        <section class="panel library" style="flex:1">
          <div class="panel-head">
            <h2>字型庫</h2>
            <span class="panel-tag">Library</span>
          </div>
          <div class="body" style="flex:1">
            <div class="upload" id="uploadZone">
              <div class="u-ico">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
              </div>
              <strong>上傳本地字型</strong>
              <span>拖放或點擊 · TTF / OTF / WOFF</span>
            </div>
            <div class="lib-controls">
              <div class="search">
                <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input type="text" placeholder="搜尋字型 · 名稱、分類" id="fontSearch">
              </div>
              <div class="seg" id="catSeg">
                <button class="active" data-cat="all">全部</button>
                <button data-cat="明體">明體</button>
                <button data-cat="黑體">黑體</button>
              </div>
            </div>
            <div class="font-list" id="fontList"></div>
          </div>
          <div class="lib-rail" id="libRail"></div>
        </section>
      </aside>

      <!-- CENTER — preview stage (+ bottom dock in mode B) -->
      <section class="col stage-col">
        <div class="stage">
          <div class="stage-bar">
            <div class="stage-tabs" id="stageTabs">
              <button class="stage-tab active" data-view="center">主預覽</button>
              <button class="stage-tab" data-view="glyph">單字檢視</button>
              <button class="stage-tab" data-view="scenes">情境版面</button>
              <button class="stage-tab" data-view="specimen">內文樣張</button>
            </div>
            <div class="stage-meta">
              <span><b id="metaFont">源雲明體</b></span>
              <span id="metaSize">150px</span>
              <span id="metaWeight">W400</span>
            </div>
            <div class="stage-tools">
              <button class="icon-btn" id="gridBtn" title="基線網格">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
              </button>
              <button class="icon-btn" id="contrastBtn" title="深色背景">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3a9 9 0 100 18 9 9 0 000-18zm0 0v18"/></svg>
              </button>
            </div>
          </div>
          <div class="canvas" id="canvas">
            <div class="preview-text" id="previewText">一杯森 活力滿分</div>
          </div>
        </div>

        <!-- Mode B: bottom control dock -->
        <div class="dock" id="dock"></div>
      </section>

      <!-- RIGHT — inspector (mode A) -->
      <aside class="col" style="display:none" id="inspectorCol">
        <section class="panel inspector" style="flex:1">
          <div class="panel-head">
            <h2>文字控制</h2>
            <span class="panel-tag">Inspector</span>
          </div>
          <div class="scroll" id="inspectorHost"></div>
        </section>
      </aside>
    </div>
  </div>

  <!-- Mode C: floating control puck -->
  <div class="puck" id="puck">
    <div class="puck-head" id="puckHead">
      <div class="t"><span class="dotmark"></span>文字控制</div>
      <button class="puck-collapse" id="puckCollapse" title="收合">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
    <div class="puck-body" id="puckHost"></div>
  </div>
  <div class="floating-hint">浮動精簡 · 預覽最大化，控制收進可拖曳面板</div>

  <script src="scenes.js"></script>
  <script src="app.js"></script>
</body>
</html>
