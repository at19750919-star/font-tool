<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>效果參考菜單</title>
<style>
  :root { color-scheme: light; }
  body { margin:0; font-family: system-ui, "Microsoft JhengHei", sans-serif; background:#f4f1ea; color:#1f2430; }
  header { padding:24px 32px 12px; position:sticky; top:0; background:#f4f1eaee; backdrop-filter:blur(6px); border-bottom:1px solid #e5e3dc; z-index:5; }
  header h1 { margin:0; font-size:22px; }
  header p { margin:6px 0 0; color:#6b7280; font-size:13px; }
  .bar { margin-top:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; border:1px solid #d1cfc7; background:#fff; font-size:14px; cursor:pointer; text-decoration:none; color:inherit; }
  .btn.primary { background:#2563eb; color:#fff; border-color:#2563eb; }
  .count { color:#9ca3af; font-size:13px; }
  .mode-tag { font-size:11px; padding:3px 9px; border-radius:999px; font-weight:700; }
  .mode-tag.dev { background:#dcfce7; color:#15803d; }
  .mode-tag.static { background:#e0e7ff; color:#4338ca; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; padding:18px 32px 80px; }
  figure { margin:0; background:#fff; border:1px solid #e5e3dc; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06); position:relative; }
  figure img { display:block; width:100%; height:auto; cursor:zoom-in; background:#faf9f6; }
  figcaption { padding:9px 12px; font-size:13px; word-break:break-all; }
  .fn { color:#9ca3af; font-size:12px; margin-bottom:4px; }
  .desc { font-size:13px; line-height:1.5; white-space:pre-wrap; min-height:18px; }
  .desc.empty { color:#c0bdb4; font-style:italic; }
  body.dev .desc { cursor:text; }
  body.dev .desc:hover { background:#f6f5f0; border-radius:4px; }
  .editbox textarea { width:100%; box-sizing:border-box; font:inherit; padding:6px 8px; border:1px solid #cfcdc4; border-radius:6px; resize:vertical; min-height:54px; }
  .editbox .acts { display:flex; gap:6px; margin-top:6px; }
  .editbox .acts button { padding:4px 10px; font-size:12px; border-radius:6px; cursor:pointer; border:1px solid #d1cfc7; background:#fff; }
  .editbox .acts .save { background:#2563eb; color:#fff; border-color:#2563eb; }
  .del { position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:8px; border:none; background:#000000aa; color:#fff; font-size:16px; cursor:pointer; opacity:0; transition:.15s; }
  figure:hover .del { opacity:1; }
  .drop { outline:3px dashed transparent; }
  .drop.over { outline-color:#2563eb; }
  .empty { padding:60px 32px; color:#9ca3af; }
  .cats { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .cats button { padding:6px 14px; border-radius:999px; border:1px solid #d1cfc7; background:#fff; font-size:13px; cursor:pointer; color:#4b5563; }
  .cats button.on { background:#2563eb; color:#fff; border-color:#2563eb; }
  .cats button .n { opacity:.6; margin-left:5px; font-size:12px; }
  .cat-h { grid-column:1/-1; display:flex; align-items:center; gap:10px; margin:8px 0 -4px; font-size:15px; font-weight:700; color:#374151; }
  .cat-h::after { content:""; flex:1; height:1px; background:#e5e3dc; }
  .cat-h .n { font-size:12px; color:#9ca3af; font-weight:500; }
  figcaption .catsel { margin-top:6px; }
  figcaption .catsel select { font:inherit; font-size:12px; padding:3px 6px; border:1px solid #d8d5cc; border-radius:6px; background:#faf9f6; color:#4b5563; cursor:pointer; }
  /* 只有開發模式（dev server 在跑）才顯示上傳 / 刪除 */
  body:not(.dev) .dev-only { display:none !important; }
</style>
</head>
<body class="drop">
<header>
  <h1>效果參考菜單</h1>
  <p>挑好哪一張,跟我說它的檔名(或描述),我用真 CSS 寫進工具。點圖可放大;切換上方分類過濾。<span class="dev-only">（開發模式：可編輯說明 / 拖曳上傳 / 刪除）</span></p>
  <div class="bar">
    <button class="btn primary dev-only" id="uploadBtn">＋ 上傳圖片</button>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <button class="btn" id="refreshBtn">↻ 重新整理</button>
    <a class="btn" href="components.html">🧩 組件樣式參考(即時 CSS)</a>
    <span class="count" id="count"></span>
    <span class="mode-tag" id="modeTag"></span>
  </div>
  <div class="cats" id="cats"></div>
</header>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const catsBar = document.getElementById('cats');
const modeTag = document.getElementById('modeTag');
let captions = {};
let allNames = [];
let manifestCat = {};       // 來自 manifest.json 的分類（進 repo）
let visibleOrder = [];
let currentFilter = '全部';
let devMode = false;
let CATS = ['文字效果','按鈕','卡片・外框','質感・材質','視覺風格','版面・布局','UI組件','AI・其他'];
let catMap = {}; try { catMap = JSON.parse(localStorage.getItem('refCats')||'{}'); } catch {}

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function autoCat(name, caption){
  const s = name + ' ' + (caption||'');
  const h = re => re.test(s);
  if (h(/出圖|提示詞|prompt|ai ?插畫|illustration|插畫/i)) return 'AI・其他';
  if (/^組件-/.test(name)) return /按鈕/.test(name) ? '按鈕' : 'UI組件';
  if (h(/型錄|總覽|線框|wireframe/i)) return '版面・布局';
  if (h(/文字效果|字效|字體|字型|標題文字|文字設計|金屬漸層|霓虹中空|螢光筆|套印|glitch|長陰影|浮雕|中空描邊|ref-0[1-6]/i)) return '文字效果';
  if (h(/按鈕|button|雙按鈕|ref-07/i)) return '按鈕';
  if (h(/卡片|外框|邊框|票券|描邊|ref-08/i)) return '卡片・外框';
  if (h(/玻璃|擬物|光影|背景圖|全息|黏土|材質|質感|霓虹/i)) return '質感・材質';
  if (h(/版面|布局|layout|dashboard|grid|產品網頁/i)) return '版面・布局';
  if (h(/風格|設計風格|12種|saas|極簡|復古|minimal|modern|retro|expressive|品牌海報/i)) return '視覺風格';
  if (h(/組件|元件|彈窗|表格|通知|載入|進度|輸入|搜尋|導覽|導航|側邊欄|底部|開關|滑桿|核取|tab|頭像|分頁|標籤|徽章|時間/i)) return 'UI組件';
  return 'UI組件';
}
// 優先序：個人 localStorage 覆蓋 > manifest 分類（repo）> 自動推斷
function catOf(name){ return catMap[name] || manifestCat[name] || autoCat(name, captions[name]); }
function setCat(name, c){ catMap[name] = c; try { localStorage.setItem('refCats', JSON.stringify(catMap)); } catch {} render(); }

async function load() {
  // 先嘗試 dev 端點（開發時即時列出 / 可上傳）；失敗則讀靜態 manifest.json（線上版）
  devMode = false; manifestCat = {};
  try {
    const lr = await fetch('/refs-list', { cache:'no-store' });
    if (!lr.ok) throw 0;
    allNames = await lr.json();
    captions = await fetch('/refs-captions', { cache:'no-store' }).then(r=>r.json()).catch(()=>({}));
    devMode = true;
  } catch {
    try {
      const m = await fetch('./manifest.json', { cache:'no-store' }).then(r=>r.json());
      CATS = m.categories || CATS;
      allNames = m.items.map(i=>i.file);
      captions = {};
      m.items.forEach(i=>{ captions[i.file] = i.caption || ''; manifestCat[i.file] = i.cat; });
    } catch {
      grid.innerHTML = '<div class="empty">讀不到清單（manifest.json 不存在，或 dev server 未啟動）</div>';
      return;
    }
  }
  document.body.classList.toggle('dev', devMode);
  modeTag.textContent = devMode ? '開發模式' : '靜態清單';
  modeTag.className = 'mode-tag ' + (devMode ? 'dev' : 'static');
  allNames.sort((a,b)=>a.localeCompare(b,'zh-Hant'));
  render();
}

function renderCatsBar(){
  const counts = {}; CATS.forEach(c=>counts[c]=0);
  allNames.forEach(n=>{ counts[catOf(n)] = (counts[catOf(n)]||0)+1; });
  const chips = [['全部', allNames.length], ...CATS.map(c=>[c, counts[c]||0])];
  catsBar.innerHTML = chips.map(([c,n])=>
    '<button data-c="'+esc(c)+'" class="'+(currentFilter===c?'on':'')+'">'+esc(c)+'<span class="n">'+n+'</span></button>'
  ).join('');
  catsBar.querySelectorAll('button').forEach(b=>b.onclick=()=>{ currentFilter=b.dataset.c; render(); });
}

function figFor(name){
  const fig = document.createElement('figure');
  const url = './' + encodeURIComponent(name);
  const desc = captions[name] || '';
  const cur = catOf(name);
  fig.innerHTML =
    '<img loading="lazy" src="'+url+'" alt="'+esc(name)+'">' +
    '<button class="del dev-only" title="刪除">✕</button>' +
    '<figcaption>' +
      '<div class="fn">'+esc(name)+'</div>' +
      '<div class="desc'+(desc?'':' empty')+'" title="'+(devMode?'點此編輯說明':'')+'">'+(desc?esc(desc):(devMode?'＋ 點此加說明':'（無說明）'))+'</div>' +
      '<div class="catsel">分類:<select>'+CATS.map(c=>'<option '+(c===cur?'selected':'')+'>'+esc(c)+'</option>').join('')+'</select></div>' +
    '</figcaption>';
  fig.querySelector('img').addEventListener('click', ()=>zoom(name));
  if (devMode) {
    fig.querySelector('.del').addEventListener('click', ()=>del(name));
    fig.querySelector('.desc').addEventListener('click', function(){ editDesc(this, name); });
  }
  fig.querySelector('.catsel select').addEventListener('change', function(){ setCat(name, this.value); });
  return fig;
}

function render(){
  countEl.textContent = allNames.length + ' 張';
  renderCatsBar();
  grid.innerHTML = '';
  if (!allNames.length) { grid.innerHTML = '<div class="empty">還沒有圖片。</div>'; return; }
  const showCats = currentFilter==='全部' ? CATS : [currentFilter];
  let shown = 0;
  visibleOrder = [];
  for (const c of showCats){
    const items = allNames.filter(n=>catOf(n)===c);
    if (!items.length) continue;
    const h = document.createElement('div'); h.className='cat-h';
    h.innerHTML = esc(c) + '<span class="n">'+items.length+' 張</span>';
    grid.appendChild(h);
    items.forEach(n=>{ grid.appendChild(figFor(n)); visibleOrder.push(n); shown++; });
  }
  if (!shown) grid.innerHTML = '<div class="empty">這個分類目前沒有圖片。</div>';
}

function editDesc(el, name){
  if (el.dataset.editing) return;
  const current = captions[name] || '';
  const box = document.createElement('div');
  box.className = 'editbox';
  box.dataset.editing = '1';
  box.innerHTML =
    '<textarea placeholder="輸入這張圖的說明…">'+esc(current)+'</textarea>' +
    '<div class="acts"><button class="save">儲存</button><button class="cancel">取消</button></div>';
  el.replaceWith(box);
  const ta = box.querySelector('textarea'); ta.focus();
  box.querySelector('.cancel').onclick = ()=>load();
  box.querySelector('.save').onclick = async ()=>{
    const text = ta.value;
    await fetch('/refs-caption',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name,text})});
    captions[name] = text;
    load();
  };
}

function zoom(name){
  let list = visibleOrder.length ? visibleOrder : allNames;
  let i = list.indexOf(name); if (i<0) i=0;
  let zoomed = false;
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:99;padding:20px;overflow:auto';
  const big=document.createElement('img'); big.style.cssText='border-radius:6px;box-shadow:0 12px 44px rgba(0,0,0,.55);cursor:zoom-in';
  const cap=document.createElement('div'); cap.style.cssText='color:#fff;font-size:13px;opacity:.85;text-align:center;word-break:break-all;max-width:90vw;flex:none';
  const navCss='position:fixed;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:30px;line-height:1;cursor:pointer;z-index:100';
  const prev=document.createElement('button'); prev.textContent='‹'; prev.title='上一張 (←)'; prev.style.cssText=navCss+';left:18px';
  const next=document.createElement('button'); next.textContent='›'; next.title='下一張 (→)'; next.style.cssText=navCss+';right:18px';
  const close=document.createElement('button'); close.textContent='✕'; close.title='關閉 (Esc)';
  close.style.cssText='position:fixed;top:16px;right:18px;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:18px;cursor:pointer;z-index:100';
  function applyZoom(){
    if(zoomed){
      big.style.maxWidth='none'; big.style.maxHeight='none'; big.style.width='auto'; big.style.cursor='zoom-out';
      o.style.alignItems='flex-start'; o.style.justifyContent='flex-start';
    } else {
      big.style.maxWidth='92vw'; big.style.maxHeight='82vh'; big.style.width='auto'; big.style.cursor='zoom-in';
      o.style.alignItems='center'; o.style.justifyContent='center'; o.scrollTo(0,0);
    }
  }
  function show(){ const n=list[i]; zoomed=false; big.src='./'+encodeURIComponent(n); cap.textContent=(i+1)+' / '+list.length+'  ·  '+n+'  （點圖放大）'; applyZoom(); }
  function go(d){ i=(i+d+list.length)%list.length; show(); }
  prev.onclick=e=>{e.stopPropagation(); go(-1);};
  next.onclick=e=>{e.stopPropagation(); go(1);};
  big.onclick=e=>{ e.stopPropagation(); zoomed=!zoomed; applyZoom(); };
  function cleanup(){ document.removeEventListener('keydown',onKey); o.remove(); }
  close.onclick=cleanup;
  o.addEventListener('click',cleanup);
  function onKey(e){ if(e.key==='ArrowLeft')go(-1); else if(e.key==='ArrowRight')go(1); else if(e.key==='Escape')cleanup(); }
  document.addEventListener('keydown',onKey);
  o.appendChild(big); o.appendChild(cap); o.appendChild(prev); o.appendChild(next); o.appendChild(close);
  document.body.appendChild(o); show();
}

async function del(name){
  if(!confirm('刪除「'+name+'」?（記得之後重跑 npm run refs:manifest）')) return;
  await fetch('/refs-delete',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name})});
  load();
}

async function uploadFiles(files){
  for(const f of files){
    if(!/\.(png|jpe?g|webp|gif)$/i.test(f.name)) continue;
    await fetch('/refs-upload?name='+encodeURIComponent(f.name),{method:'POST',body:f});
  }
  load();
}

document.getElementById('uploadBtn').onclick = ()=>fileInput.click();
document.getElementById('fileInput').onchange = e=>uploadFiles(e.target.files);
document.getElementById('refreshBtn').onclick = load;

const body=document.body;
['dragenter','dragover'].forEach(ev=>body.addEventListener(ev,e=>{e.preventDefault();if(devMode)body.classList.add('over');}));
['dragleave','drop'].forEach(ev=>body.addEventListener(ev,e=>{e.preventDefault();if(ev!=='dragleave')body.classList.remove('over');}));
body.addEventListener('drop',e=>{ body.classList.remove('over'); if(devMode && e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); });

load();
</script>
</body>
</html>
